<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC VR-OS | SENTINEL v6.0 SOVEREIGNTY CORE</title>

    <script>
        /* ════════════════════════════════════════════════════════
           MOBILE DETECTION & SYSTEM STATE
        ════════════════════════════════════════════════════════ */
        window.IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        if (window.IS_MOBILE) {
            document.documentElement.setAttribute('data-mobile', 'true');
        }

        /* ════════════════════════════════════════════════════════
           BOOT GATE
        ════════════════════════════════════════════════════════ */
        window.SENTINEL_BOOTED = false;
    </script>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>

    <script src="sentinel-bus.js"></script>
    <script src="sentinel-core.js"></script> 
    <script src="js_sentinel_engine-xr.js"></script>
    <script src="js_sentinel_jarvis-voice.js"></script>
    <script src="js_sentinel_protocols.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css_sentinel_core.css">
    <link rel="stylesheet" href="css_sentinel_hud.css">
    <link rel="stylesheet" href="css_sentinel_fx.css">
</head>

<body class="system-idle">

    <div id="onboarding-overlay">
        <div class="overlay-inner">
            <div class="overlay-scan-line"></div>
            <h1>SENTINEL v6.0</h1>
            <p>Sincronizando Mielina... Estado: ALPHA</p>
            <button class="boot-btn" id="master-boot-trigger">
                INICIALIZAR PROTOCOLO
            </button>
            <div class="status-msg" id="boot-status">Sinal de Clock: Estável</div>
        </div>
    </div>

    <div id="hud-2d">
        <div class="hud-corner top-left">
            <div class="label">SISTEMA</div>
            <div class="value">SENTINEL_v6_PRO</div>
        </div>
        <div class="hud-corner top-right">
            <div class="label">LATÊNCIA</div>
            <div id="latency-value" class="value">0.0ms</div>
        </div>
        <div class="hud-corner bottom-left">
            <div class="label">BATERIA_CPF</div>
            <div id="battery-value" class="value">100%</div>
        </div>
    </div>

    <a-scene embedded renderer="antialias: true; colorManagement: true;" fog="type: exponential; color: #000; density: 0.03;">

        <a-assets>
            <a-mixin id="window-base"
                     geometry="primitive: plane; width: 3.2; height: 1.8"
                     material="shader: standard; transparent: true; opacity: 0.2; side: double; emissive: #00D4FF; emissiveIntensity: 0.15">
            </a-mixin>
        </a-assets>

        <a-light type="ambient" color="#0a1a2a" intensity="0.6"></a-light>
        <a-light type="directional" color="#00D4FF" intensity="0.3" position="0 4 -2"></a-light>

        <a-entity id="reactor-core" position="0 1 -3.5">
            <a-sphere radius="0.15" color="#00D4FF" material="emissive: #00D4FF; emissiveIntensity: 2">
                <a-light type="point" color="#00D4FF" intensity="1.2" distance="8"></a-light>
            </a-sphere>
        </a-entity>

        <a-entity id="mon-0" class="ghost-window" ghost-window="title: CORE_TERMINAL" mixin="window-base" position="0 1.6 -3">
            <a-text id="nexus-display" value="SENTINEL ONLINE\nAGUARDANDO INPUT..." color="#00D4FF" width="3" wrap-count="38" position="-1.4 0.5 0.01" align="left" font="mozillavr"></a-text>
        </a-entity>

        <a-entity id="mon-1l" class="ghost-window" ghost-window="title: DIAGNOSTICO" mixin="window-base" position="-3.2 1.6 -2.8" rotation="0 30 0">
            <a-text value="DIAGNOSTICO_LOG\nSem eventos críticos." color="#00D4FF" width="3" wrap-count="34" position="-1.4 0.5 0.01" align="left" font="mozillavr"></a-text>
        </a-entity>

        <a-entity id="mon-1r" class="ghost-window" ghost-window="title: ROOT_LIB" mixin="window-base" position="3.2 1.6 -2.8" rotation="0 -30 0">
            <a-text value="ROOT_LIBRARY\nReferências técnicas." color="#00D4FF" width="3" wrap-count="34" position="-1.4 0.5 0.01" align="left" font="mozillavr"></a-text>
        </a-entity>

        <a-entity id="mon-2l" class="ghost-window" ghost-window="title: DATA_STREAM" mixin="window-base" position="-5.8 1.6 -1.8" rotation="0 55 0">
            <a-text value="DATA_STREAM\nFluxo bruto ativo." color="#00FF41" width="3" wrap-count="34" position="-1.4 0.5 0.01" align="left" font="mozillavr"></a-text>
        </a-entity>

        <a-entity id="mon-2r" class="ghost-window" ghost-window="title: CLOCK_ATC" mixin="window-base" position="5.8 1.6 -1.8" rotation="0 -55 0">
            <a-text id="clock-display" value="CLOCK_ATC\nSinal Estável." color="#00FF41" width="3" wrap-count="34" position="-1.4 0.5 0.01" align="left" font="mozillavr"></a-text>
        </a-entity>

        <a-sky color="#000010"></a-sky>
        <a-entity id="particle-entity" position="0 2.25 -10" particle-system="preset: dust; color: #00D4FF; particleCount: 800"></a-entity>

        <a-entity id="camera-rig">
            <a-entity camera id="main-camera" look-controls position="0 1.6 0">
                <a-cursor color="#00D4FF" fuse="false" raycaster="objects: .ghost-window"></a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn     = document.getElementById('master-boot-trigger');
            const overlay = document.getElementById('onboarding-overlay');

            if (btn) {
                btn.addEventListener('click', function() {
                    console.log("SENTINEL: Executando boot de soberania...");

                    // 1. Notifica o Barramento que o Boot ocorreu (Libera Jarvis e Engine)
                    if (window.SentinelBus) {
                        window.SentinelBus.emit('boot:complete', { timestamp: Date.now() });
                    }

                    // 2. Chama inicialização do Engine-XR se existir
                    if (typeof bootSystem === 'function') {
                        bootSystem();
                    }

                    // 3. Atualiza estado global
                    window.SENTINEL_BOOTED = true;
                    document.body.classList.remove('system-idle');
                    document.body.classList.add('system-ready');

                    // 4. Efeito visual de saída
                    overlay.style.transition = 'opacity 1s ease, filter 1s ease, visibility 1s';
                    overlay.style.opacity    = '0';
                    overlay.style.filter     = 'blur(20px)';
                    overlay.style.pointerEvents = 'none';

                    setTimeout(() => {
                        overlay.style.display = 'none';
                        console.log("SENTINEL: Overlay purgado. Interface XR liberada.");
                    }, 1000);
                });
            }

            // ATALHOS DE TECLADO OPERACIONAIS
            window.addEventListener('keydown', function(e) {
                // Tecla 'J' - Ativa Jarvis VoiceListener
                if (e.key.toLowerCase() === 'j') {
                    if (typeof VoiceListener !== 'undefined') {
                        VoiceListener.start();
                        console.log("[INPUT] VoiceListener ativado via Teclado.");
                    }
                }
            });

            // LOOP DE TELEMETRIA (CLOCK ATC & SESSION)
            setInterval(() => {
                const clockEl = document.getElementById('clock-display');
                if (!clockEl || !window.SENTINEL_BOOTED) return;
                
                const now = new Date();
                const ts = now.toTimeString().slice(0, 8);
                
                // Cálculo de tempo de sessão via StateStore (sentinel-core)
                let elapsed = 0;
                if (typeof StateStore !== 'undefined') {
                    const startTime = StateStore.get('telemetry.startTime');
                    elapsed = Math.floor((Date.now() - startTime) / 1000);
                }
                    
                clockEl.setAttribute('value', `CLOCK_ATC\n${ts}\nSessão: ${elapsed}s`);
                
                // Sincroniza HUD 2D de Latência (Exemplo de interface cruzada)
                const latEl = document.getElementById('latency-value');
                if(latEl && typeof StateStore !== 'undefined') {
                    latEl.textContent = StateStore.get('ops.latency') || '0.0ms';
                }
            }, 1000);
        });
    </script>
</body>
</html>

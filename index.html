<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        OMC VR-OS | SENTINEL v6.0 SOVEREIGNTY CORE
    </title>

    <script>
        /* ════════════════════════════════════════════════════════
           MOBILE DETECTION
           Pré-renderização XR
        ════════════════════════════════════════════════════════ */

        window.IS_MOBILE =
            /Mobi|Android|iPhone|iPad/i.test(
                navigator.userAgent
            );

        if (window.IS_MOBILE) {

            document.documentElement.setAttribute(
                'data-mobile',
                'true'
            );
        }
    </script>

    <!-- A-FRAME -->

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>

    <!-- FONTS -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap"
          rel="stylesheet">

    <!-- CSS ENGINE -->

    <link rel="stylesheet"
          href="css_sentinel_core.css">

    <link rel="stylesheet"
          href="css_sentinel_hud.css">

    <link rel="stylesheet"
          href="css_sentinel_fx.css">

</head>

<body class="system-idle sovereign-root">

    <!-- ════════════════════════════════════════════════════════
         ONBOARDING / NEURAL BOOT
    ════════════════════════════════════════════════════════ -->

    <div id="onboarding-overlay">

        <div class="overlay-inner cyber-glass">

            <div class="overlay-scan-line"></div>

            <h1 class="overlay-title">
                SINCRO_INICIAL
            </h1>

            <p class="overlay-sub">
                AGUARDANDO DETECÇÃO DE CONSCIÊNCIA...
            </p>

            <div class="overlay-progress"
                 id="overlay-progress">

                <span id="progress-text">
                    HANDSHAKE... 0%
                </span>

                <div class="progress-bar">

                    <div id="progress-fill"></div>

                </div>

            </div>

            <button id="connect-btn"
                    class="boot-btn"
                    onclick="bootSystem()">

                ESTABELECER CONEXÃO

            </button>

        </div>

    </div>

    <!-- ════════════════════════════════════════════════════════
         HUD LAYER
    ════════════════════════════════════════════════════════ -->

    <div id="hud-layer">

        <div id="hud-top-bar"
             class="cyber-glass">

            <span id="session-clock">
                --:--:--
            </span>

            <span id="hud-title">
                OMC VR-OS · SENTINEL v6.0
            </span>

            <span id="hud-status">
                ● LINK ESTÁVEL
            </span>

        </div>

        <div id="hud-bottom-bar"
             class="cyber-glass">

            <span id="bio-feedback-dom">
                OPERADOR_IDENTIFICADO
            </span>

            <span id="battery-value">
                CPF_BATTERY: 100%
            </span>

            <span id="hud-session">
                SESSION: 00:00
            </span>

            <span id="latency-value"
                  class="latency-ok">

                LAT: 12ms

            </span>

        </div>

        <div id="cmd-wrapper"
             class="cyber-glass">

            <span class="cmd-prompt">
                SENTINEL:~$
            </span>

            <input id="cmd-input"
                   type="text"
                   autocomplete="off"
                   spellcheck="false"
                   placeholder="aguardando input do operador..." />

        </div>

        <!-- MISSION LOCK -->

        <div id="mission-lock"
             class="cyber-glass">

            <span class="mission-label">
                MISSION
            </span>

            <span id="mission-text">
                AGUARDANDO DIRETRIZ...
            </span>

        </div>

    </div>

    <!-- FX LAYERS -->

    <div class="crt-overlay"></div>
    <div class="vignette"></div>
    <div class="orbital-noise"></div>

    <!-- ════════════════════════════════════════════════════════
         MAIN XR SCENE
    ════════════════════════════════════════════════════════ -->

    <a-scene

        id="main-scene"

        fog="
            type: exponential;
            color: #000000;
            density: 0.085
        "

        renderer="
            antialias: true;
            colorManagement: true;
            exposure: 1.35;
            precision: high;
            physicallyCorrectLights: true;
            logarithmicDepthBuffer: true;
        "

        loading-screen="
            dotsColor: #00D4FF;
            backgroundColor: black
        "

        vr-mode-ui="enabled: false">

        <!-- ════════════════════════════════════════════════════
             ASSETS & MIXINS
        ════════════════════════════════════════════════════ -->

        <a-assets>

            <!-- QUANTUM SIGIL -->

            <a-mixin

                id="quantum-sigil"

                material="
                    color: #00D4FF;
                    wireframe: true;
                    opacity: 0.55;
                    emissive: #00D4FF;
                    emissiveIntensity: 0.6;
                    metalness: 0.9;
                    roughness: 0.1;
                "

                animation__rotate="
                    property: rotation;
                    to: 0 360 0;
                    dur: 15000;
                    loop: true;
                    easing: linear
                ">

            </a-mixin>

            <!-- GREEN FLOW -->

            <a-mixin

                id="deepflow-sigil"

                material="
                    color: #00FF41;
                    wireframe: true;
                    opacity: 0.35;
                    emissive: #00FF41;
                    emissiveIntensity: 0.8;
                    metalness: 1;
                    roughness: 0.05;
                "

                animation__rotate="
                    property: rotation;
                    to: 360 360 0;
                    dur: 8000;
                    loop: true;
                    easing: linear
                ">

            </a-mixin>

            <!-- ALERT -->

            <a-mixin

                id="sigil-red"

                material="
                    color: #FF4B00;
                    wireframe: true;
                    opacity: 0.55;
                    emissive: #FF4B00;
                    emissiveIntensity: 0.6;
                "

                animation__rotate="
                    property: rotation;
                    to: 0 360 0;
                    dur: 10000;
                    loop: true;
                    easing: linear
                ">

            </a-mixin>

            <!-- LABEL -->

            <a-mixin

                id="label-text"

                text="
                    align: center;
                    color: #00D4FF;
                    font: monoid;
                    width: 4;
                "

                position="0 -1.2 0">

            </a-mixin>

        </a-assets>

        <!-- ════════════════════════════════════════════════════
             VOID ENVIRONMENT
        ════════════════════════════════════════════════════ -->

        <a-sky color="#000000"></a-sky>

        <!-- DATA FOG / PARTICLES -->

        <a-entity id="volumetric-fog">

            <a-entity
                particle-system="
                    preset: dust;
                    particleCount: 6000;
                    color: #00D4FF,#00FF41,#003344;
                    size: 0.045;
                    opacity: 0.18;
                    maxAge: 18;
                    velocityValue: 0 0.01 0;
                ">
            </a-entity>

        </a-entity>

        <!-- GRID -->

        <a-plane

            id="grid-floor"

            rotation="-90 0 0"

            width="300"
            height="300"

            material="
                color: #00D4FF;
                opacity: 0.04;
                wireframe: true;
                transparent: true;
            ">

        </a-plane>

        <!-- ════════════════════════════════════════════════════
             LIGHTING ENGINE
        ════════════════════════════════════════════════════ -->

        <a-light
            type="ambient"
            color="#001a2e"
            intensity="0.45">
        </a-light>

        <a-light
            type="directional"
            position="0 6 -3"
            intensity="0.35"
            color="#00D4FF">
        </a-light>

        <a-light
            type="point"
            position="0 2 -5"
            intensity="0.8"
            distance="12"
            color="#00FF41">
        </a-light>

        <!-- ════════════════════════════════════════════════════
             REACTOR CORE
        ════════════════════════════════════════════════════ -->

        <a-entity id="reactor-core"
                  position="0 0.6 -5">

            <!-- NUCLEUS -->

            <a-sphere

                id="reactor-nucleus"

                radius="0.18"

                material="
                    color: #00D4FF;
                    emissive: #00D4FF;
                    emissiveIntensity: 3;
                    transparent: true;
                    opacity: 0.9;
                    metalness: 1;
                    roughness: 0;
                "

                animation__pulse="
                    property: material.emissiveIntensity;
                    from: 2;
                    to: 5;
                    dur: 900;
                    direction: alternate;
                    loop: true;
                    easing: easeInOutSine
                "

                animation__scale="
                    property: scale;
                    from: 1 1 1;
                    to: 1.2 1.2 1.2;
                    dur: 900;
                    direction: alternate;
                    loop: true;
                    easing: easeInOutSine
                ">

            </a-sphere>

            <!-- REACTOR LIGHT -->

            <a-light

                type="point"

                id="reactor-light"

                intensity="2"

                distance="10"

                color="#00D4FF"

                animation="
                    property: intensity;
                    from: 1;
                    to: 3;
                    dur: 900;
                    direction: alternate;
                    loop: true;
                    easing: easeInOutSine
                ">

            </a-light>

            <!-- ORBITAL RINGS -->

            <a-torus
                radius="0.65"
                radius-tubular="0.008"
                mixin="quantum-sigil"

                animation="
                    property: rotation;
                    to: 360 0 360;
                    dur: 4000;
                    loop: true;
                    easing: linear
                ">
            </a-torus>

            <a-torus
                radius="0.95"
                radius-tubular="0.01"
                mixin="deepflow-sigil"

                rotation="90 0 0"

                animation="
                    property: rotation;
                    to: 90 360 0;
                    dur: 6000;
                    loop: true;
                    easing: linear
                ">
            </a-torus>

            <a-torus
                radius="1.25"
                radius-tubular="0.012"
                mixin="quantum-sigil"

                rotation="0 0 90"

                animation="
                    property: rotation;
                    to: 0 360 360;
                    dur: 9000;
                    loop: true;
                    easing: linear
                ">
            </a-torus>

            <!-- LABEL -->

            <a-text

                value="REACTOR-CORE\n[QUANTUM_ENGINE]"

                align="center"

                color="#00D4FF"

                font="monoid"

                width="3.5"

                position="0 -1.5 0"

                opacity="0.7">

            </a-text>

        </a-entity>

        <!-- ════════════════════════════════════════════════════
             MONITOR 0
        ════════════════════════════════════════════════════ -->

        <a-entity

            id="mon-0"

            class="ghost-window focus-node"

            position="0 2 -4"

            scale="1.2 1.2 1.2">

            <a-sphere
                radius="0.35"
                mixin="quantum-sigil"
                material="wireframe:false;opacity:0.15">
            </a-sphere>

            <a-torus
                radius="0.6"
                radius-tubular="0.01"
                mixin="quantum-sigil">
            </a-torus>

            <a-text
                value="[KERNEL_MONITOR]"
                mixin="label-text"
                position="0 -0.8 0.1">
            </a-text>

        </a-entity>

        <!-- LEFT -->

        <a-entity

            id="mon-minus-1"

            class="ghost-window"

            position="-2.5 2 -3.5"

            rotation="0 20 0">

            <a-octahedron
                radius="0.4"
                mixin="quantum-sigil">
            </a-octahedron>

            <a-text
                id="mielina-value"
                value="150 m/s"
                mixin="label-text">
            </a-text>

        </a-entity>

        <!-- RIGHT -->

        <a-entity

            id="mon-plus-1"

            class="ghost-window"

            position="2.5 2 -3.5"

            rotation="0 -20 0">

            <a-tetrahedron
                radius="0.55"
                mixin="quantum-sigil">
            </a-tetrahedron>

            <a-text
                id="nexus-display"
                value="NEXUS"
                mixin="label-text">
            </a-text>

        </a-entity>

        <!-- BIOMETRY -->

        <a-entity

            id="bio-monitor"

            position="-1.6 0.6 -2.2"

            rotation="-25 15 0">

            <a-dodecahedron

                radius="0.28"

                mixin="deepflow-sigil"

                animation__pulse="
                    property: scale;
                    from: 1 1 1;
                    to: 1.15 1.15 1.15;
                    dur: 700;
                    direction: alternate;
                    loop: true;
                    easing: easeInOutSine
                ">

            </a-dodecahedron>

            <a-text

                value="STATUS\n[BIOMETRIA]"

                align="center"

                color="#00FF41"

                font="monoid"

                width="2.8"

                position="0 -1.1 0">

            </a-text>

        </a-entity>

        <!-- FIREWALL -->

        <a-entity

            id="firewall-sigil"

            position="1.6 0.6 -2.2"

            rotation="-25 -15 0">

            <a-torus-knot

                radius="0.28"

                radius-tubular="0.025"

                p="3"

                q="7"

                mixin="sigil-red">

            </a-torus-knot>

            <a-text

                value="SOBERANIA\n[FIREWALL]"

                align="center"

                color="#FF4B00"

                font="monoid"

                width="2.8"

                position="0 -1.1 0">

            </a-text>

        </a-entity>

        <!-- CAMERA RIG -->

        <a-entity id="camera-rig"
                  position="0 0 0">

            <a-entity

                camera

                id="main-camera"

                look-controls

                position="0 1.6 0">

                <a-cursor

                    id="cursor"

                    color="#00D4FF"

                    fuse="true"

                    fuse-timeout="800"

                    raycaster="
                        objects:
                        .ghost-window,
                        #reactor-core,
                        #bio-monitor,
                        #firewall-sigil
                    "

                    animation__fusing="
                        property: scale;
                        from: 1 1 1;
                        to: 0.1 0.1 0.1;
                        dur: 800;
                        startEvents: fusing
                    ">

                </a-cursor>

            </a-entity>

        </a-entity>

    </a-scene>

    <!-- ════════════════════════════════════════════════════════
         SCRIPT ENGINE
    ════════════════════════════════════════════════════════ -->

    <script src="js_sentinel_kernel.js"></script>

    <script src="js_sentinel_engine-xr.js"></script>

    <script src="js_sentinel_protocols.js"></script>

    <script src="js_sentinel_jarvis-voice.js"></script>

</body>

</html>
